<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>blame-zeus — Greek Mythology Lore Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
<div class="max-w-3xl mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-1">blame-zeus</h1>
    <p class="text-slate-600 mb-6">Greek Mythology Lore Assistant — source-attributed Q&amp;A with conflict awareness</p>

    <form method="post" action="/web/query" class="flex gap-2 mb-8">
        <input type="text" name="question" th:value="${question}"
               placeholder="Ask about Greek mythology..."
               class="flex-1 border border-slate-300 rounded px-3 py-2"/>
        <button type="submit" class="bg-slate-800 text-white rounded px-4 py-2">Ask</button>
    </form>

    <div th:if="${response != null}" class="space-y-6">

        <span th:switch="${response.routeDecision?.name()}"
              class="inline-block rounded-full px-3 py-1 text-sm font-semibold">
            <span th:case="'SQL'" class="bg-blue-100 text-blue-800 rounded-full px-3 py-1">SQL</span>
            <span th:case="'RAG'" class="bg-green-100 text-green-800 rounded-full px-3 py-1">RAG</span>
            <span th:case="'MIXED'" class="bg-purple-100 text-purple-800 rounded-full px-3 py-1">MIXED</span>
            <span th:case="*" class="bg-slate-200 text-slate-700 rounded-full px-3 py-1">&mdash;</span>
        </span>

        <div th:if="${response.serviceError}"
             class="bg-red-100 border border-red-300 text-red-800 rounded px-4 py-3">
            Something went wrong answering that. Try rephrasing.
        </div>

        <div th:unless="${response.serviceError}">
            <p class="text-lg leading-relaxed" th:text="${response.answer}">Answer text</p>

            <ol th:if="${!response.citations.isEmpty()}" class="mt-4 list-decimal list-inside text-sm text-slate-600 space-y-1">
                <li th:each="citation : ${response.citations}">
                    <span th:text="${citation.author + ', ' + citation.work}">Author, Work</span>
                    <span th:if="${citation.passageRef}" th:text="${' (' + citation.passageRef + ')'}"></span>
                    <span th:if="${citation.stance}" th:text="${' [' + citation.stance + ']'}"></span>
                </li>
            </ol>

            <div th:if="${!response.conflicts.isEmpty()}" class="mt-6 border-t border-slate-200 pt-4">
                <h2 class="font-semibold text-orange-700 mb-2">Sources disagree</h2>
                <ul class="space-y-2 text-sm">
                    <li th:each="conflict : ${response.conflicts}" class="bg-orange-50 border border-orange-200 rounded px-3 py-2">
                        <span th:text="${conflict.sourceAuthor + ', ' + conflict.sourceWork + ': ' + conflict.claimValue}">Author, Work: claim</span>
                        <span th:if="${conflict.passageRef}" th:text="${' (' + conflict.passageRef + ')'}"></span>
                    </li>
                </ul>
            </div>

            <details th:if="${response.sqlGenerated != null}" class="mt-6">
                <summary class="cursor-pointer text-sm font-semibold text-slate-600">Show generated SQL</summary>
                <pre class="mt-2 bg-slate-900 text-slate-100 text-xs rounded p-3 overflow-x-auto"><code th:text="${response.sqlGenerated}">SELECT ...</code></pre>
            </details>
        </div>
    </div>
</div>
</body>
</html>
