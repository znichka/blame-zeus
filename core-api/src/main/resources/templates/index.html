<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>blame-zeus — Greek Mythology Lore Assistant</title>
    <link rel="stylesheet" href="/css/blame-zeus.css">
    <script src="/js/examples.js" defer></script>
</head>
<body>
<div class="strip strip-meander" aria-hidden="true"></div>

<div class="site-wrap">
    <header class="site-header">
        <h1 class="site-title">Blame Zeus</h1>
        <p class="site-tagline">Greek Mythology Lore Assistant — source-attributed Q&amp;A with conflict awareness</p>
    </header>

    <form method="post" action="/web/query" class="query-form">
        <input type="text" name="question" th:value="${question}"
               placeholder="Who slew the Hydra?"
               class="query-input"/>
        <button type="submit" class="query-submit" aria-label="Ask">&#8594;</button>
    </form>

    <div class="chips">
        <button type="button" class="chip" data-question="Who were Aphrodite's parents?">Who were Aphrodite's parents?</button>
        <button type="button" class="chip" data-question="How did Achilles die?">How did Achilles die?</button>
        <button type="button" class="chip" data-question="Who was Io's father?">Who was Io's father?</button>
        <button type="button" class="chip" data-question="Why did Athena turn Arachne into a spider?">Why did Athena turn Arachne into a spider?</button>
        <button type="button" class="chip" data-question="Which Olympians are children of Cronus?">Which Olympians are children of Cronus?</button>
        <button type="button" class="chip" data-question="Which heroes had a divine parent and died at Troy?">Which heroes had a divine parent and died at Troy?</button>
    </div>

    <div class="strip strip-wave" aria-hidden="true"></div>

    <div th:if="${response != null}" class="results">

        <span th:switch="${response.routeDecision?.name()}">
            <span th:case="'SQL'" class="route-badge">SQL</span>
            <span th:case="'RAG'" class="route-badge">RAG</span>
            <span th:case="'MIXED'" class="route-badge">MIXED</span>
            <span th:case="*" class="route-badge">&mdash;</span>
        </span>

        <div th:if="${response.serviceError}" class="error-box">
            Something went wrong answering that. Try rephrasing.
        </div>

        <div th:unless="${response.serviceError}" class="results__body">
            <div class="verdict">
                <span class="verdict__label">Verdict</span>
                <p class="verdict__text" th:text="${response.answer}">Answer text</p>
            </div>

            <div th:if="${!response.citations.isEmpty()}" class="panel">
                <p class="panel__label">Sources</p>
                <ul class="source-list">
                    <li th:each="citation : ${response.citations}" class="source-card">
                        <span th:text="${citation.author + ', ' + citation.work}">Author, Work</span>
                        <span class="source-card__meta" th:if="${citation.passageRef}" th:text="${' (' + citation.passageRef + ')'}"></span>
                        <span class="source-card__meta" th:if="${citation.stance}" th:text="${' [' + citation.stance + ']'}"></span>
                    </li>
                </ul>
            </div>

            <!-- ADR-015 Track E2: fallback-only. When AnswerComposer successfully weaves
                 conflicts into the prose above (conflictsInProse), this box would just duplicate
                 what's already in the answer -- shown only when weaving didn't happen but
                 structured conflicts[] still came back non-empty, so conflict information is
                 never lost and never duplicated. -->
            <div th:if="${!response.conflictsInProse && !response.conflicts.isEmpty()}" class="panel panel--conflict">
                <p class="panel__label">Sources disagree</p>
                <ul class="conflict-list">
                    <li th:each="conflict : ${response.conflicts}" class="conflict-card">
                        <span th:text="${conflict.sourceAuthor + ', ' + conflict.sourceWork + ': ' + conflict.claimValue}">Author, Work: claim</span>
                        <span class="conflict-card__meta" th:if="${conflict.passageRef}" th:text="${' (' + conflict.passageRef + ')'}"></span>
                    </li>
                </ul>
            </div>

            <details th:if="${response.sqlGenerated != null}" class="sql-details">
                <summary>Show generated SQL</summary>
                <pre class="sql-pre"><code th:text="${response.sqlGenerated}">SELECT ...</code></pre>
            </details>
        </div>
    </div>
</div>
</body>
</html>
