spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:blamezeus}
    username: ${POSTGRES_APP_USER:zeus_app}
    password: ${POSTGRES_APP_PASSWORD:app_password}
    hikari:
      connection-init-sql: "SET statement_timeout = '3s'"
  flyway:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:blamezeus}
    user: ${POSTGRES_USER:zeus}
    password: ${POSTGRES_PASSWORD:olympus}
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate

# Stage P2 Track E1: surfaces the DEBUG lines already present in SqlQueryHandler,
# QueryService.fetchClaims, and NarrativeChunkContentRetriever (generated SQL, probe/lookup,
# retrieval). No separate `debug` Spring profile — this is a single-deployment PoC (no prod/dev
# split yet), so a flat always-on level is simpler than a profile no one would remember to enable.
logging:
  level:
    com.blamezeus.coreapi: DEBUG

app:
  llm:
    chat-api-key: ${LLM_API_KEY}                # Anthropic key since ADR-008 (chat = Claude Haiku 4.5)
    embedding-api-key: ${OPENAI_API_KEY}         # always OpenAI — embeddings on text-embedding-3-large since ADR-013
    chat-model: ${LLM_CHAT_MODEL}
    embedding-model: ${EMBEDDING_MODEL:text-embedding-3-large}   # single source of truth (ADR-006); consumer wired in LangChain4jConfig (deferred)
  rag:
    max-results: ${RAG_MAX_RESULTS:5}
    # Tuned down from the §7 starting value of 0.65 to 0.5 at Track H8 (DEV-049): live FACT Q3/Q5
    # top-1 cosine scores against the real corpus/embedding model landed at 0.605/0.627 — genuinely
    # relevant top hits, but below 0.65 — while a clearly off-topic negative-control question still
    # scored low enough to return zero chunks at 0.5, confirming headroom against noise.
    min-score: ${RAG_MIN_SCORE:0.5}
