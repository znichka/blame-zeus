services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympus}
      POSTGRES_DB: ${POSTGRES_DB:-blamezeus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeus} -d ${POSTGRES_DB:-blamezeus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    # build: ./core-api  # TODO: add Dockerfile in Stage 1c/later
    image: eclipse-temurin:21-jre
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-blamezeus}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-zeus_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-app_password}
      POSTGRES_USER: ${POSTGRES_USER:-zeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympus}
      LLM_API_KEY: ${LLM_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  telegram-bot:
    # build: ./telegram-bot  # TODO: add Dockerfile in Stage 11
    image: eclipse-temurin:21-jre
    depends_on:
      core-api:
        condition: service_healthy
    environment:
      CORE_API_BASE_URL: ${CORE_API_BASE_URL:-http://core-api:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-BlameZeusBot}

volumes:
  postgres_data:
