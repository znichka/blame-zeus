services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zeus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-olympus}
      POSTGRES_DB: ${POSTGRES_DB:-blamezeus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zeus} -d ${POSTGRES_DB:-blamezeus}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
